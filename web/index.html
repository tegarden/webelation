<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Webelation UI</title>
    <script defer src="./app.js"></script>
    <script defer src="./alpinejs-3.14.9.min.js"></script>
    <style>
      :root {
        color-scheme: light;
        --bg: #ffffff;
        --panel: #fffdf8;
        --panel-strong: #f7f2e7;
        --line: #d4cab6;
        --line-strong: #b7a88d;
        --text: #444444;
        --muted: #666666;
        --accent: #315f72;
        --accent-soft: #e1ecf1;
        --shadow: 0 18px 40px rgba(51, 42, 25, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Georgia, "Palatino Linotype", "Book Antiqua", Palatino, serif;
        font-size: 0.95rem;
        line-height: 1.75;
        text-rendering: optimizeLegibility;
        font-kerning: normal;
        background: var(--bg);
        color: var(--text);
      }

      .shell {
        height: 100vh;
        padding: 16px;
      }

      .app {
        width: 100%;
        height: calc(100vh - 32px);
        background: var(--panel);
        border: 1px solid var(--line-strong);
        border-radius: 14px;
        overflow: hidden;
        box-shadow: var(--shadow);
        display: flex;
        flex-direction: column;
      }

      .toolbar {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 12px;
        padding: 14px 18px;
        border-bottom: 1px solid var(--line);
        background: linear-gradient(180deg, #fcfaf5 0%, #f3ecdf 100%);
      }

      .toolbar label {
        font-size: 0.95rem;
        font-weight: 700;
      }

      .toolbar input[type="file"] {
        max-width: 100%;
        font: inherit;
        color: transparent;
      }

      .toolbar input[type="file"]::file-selector-button {
        margin-right: 0;
        font: inherit;
        color: var(--muted);
      }

      .toolbar-status {
        min-width: 0;
        color: var(--muted);
        font-size: 0.92rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .layout {
        display: grid;
        grid-template-columns: 280px minmax(0, 1fr);
        flex: 1;
        min-height: 0;
        overflow: hidden;
      }

      .sidebar {
        border-right: 1px solid var(--line);
        background:
          linear-gradient(180deg, rgba(225, 236, 241, 0.45), transparent 140px),
          var(--panel-strong);
        padding: 18px 14px;
        overflow: auto;
        min-height: 0;
      }

      .content {
        padding: 22px 26px;
        overflow: auto;
        min-height: 0;
      }

      .tree {
        display: flex;
        flex-direction: column;
        gap: 1px;
      }

      .tree-row {
        display: flex;
        align-items: center;
        width: 100%;
        gap: 8px;
        padding: 3px 8px;
        border: 0;
        border-radius: 10px;
        background: transparent;
        color: inherit;
        text-align: left;
        cursor: pointer;
        font: inherit;
        line-height: 1.35;
      }

      .tree-row:hover {
        background: rgba(49, 95, 114, 0.08);
      }

      .tree-row.active {
        background: var(--accent-soft);
        color: #163746;
      }

      .caret {
        width: 14px;
        color: var(--muted);
        flex: 0 0 14px;
      }

      .tree-label {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .tree-icon {
        flex: 0 0 auto;
      }

      .detail-grid {
        display: grid;
        grid-template-columns: 120px minmax(0, 1fr);
        gap: 14px 18px;
        align-items: start;
      }

      .detail-label {
        font-size: 0.95rem;
        font-weight: 700;
        color: var(--muted);
      }

      .detail-row {
        display: contents;
      }

      .detail-value {
        min-width: 0;
        font-size: 1rem;
        line-height: 1.5;
      }

      .detail-title {
        margin: 0 0 18px;
        font-size: 1.6rem;
        line-height: 1.2;
      }

      .actions {
        display: inline-flex;
        gap: 8px;
        margin-left: 10px;
        vertical-align: middle;
      }

      .button {
        padding: 4px 10px;
        border: 1px solid var(--line-strong);
        border-radius: 999px;
        background: #fff;
        color: var(--text);
        cursor: pointer;
        font: inherit;
        font-size: 0.9rem;
      }

      .toolbar .button {
        padding: 7px 12px;
      }

      .button:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      .notes {
        margin: 0;
        white-space: pre-wrap;
      }

      .empty-state {
        color: var(--muted);
        font-style: italic;
      }

      .password-dialog {
        width: min(420px, calc(100vw - 32px));
        padding: 0;
        border: 1px solid var(--line-strong);
        border-radius: 16px;
        box-shadow: var(--shadow);
        background: var(--panel);
        color: var(--text);
      }

      .password-dialog::backdrop {
        background: rgba(35, 28, 18, 0.35);
        backdrop-filter: blur(4px);
      }

      .dialog-card {
        padding: 22px;
      }

      .dialog-title {
        margin: 0 0 10px;
        font-size: 1.35rem;
      }

      .dialog-copy {
        margin: 0 0 16px;
        color: var(--muted);
        line-height: 1.5;
      }

      .dialog-field {
        display: grid;
        gap: 8px;
      }

      .dialog-field label {
        font-size: 0.95rem;
        font-weight: 700;
      }

      .dialog-field input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid var(--line-strong);
        border-radius: 10px;
        background: #fff;
        color: var(--text);
        font: inherit;
      }

      .dialog-actions {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        margin-top: 18px;
      }

      @media (max-width: 720px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .sidebar {
          border-right: 0;
          border-bottom: 1px solid var(--line);
          max-height: 42vh;
        }

        .content {
          padding: 18px;
        }

        .detail-grid {
          grid-template-columns: 1fr;
          gap: 6px 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell" x-data="vaultApp()">
      <div class="app">
        <div class="toolbar">
          <label for="vault-file">Open File:</label>
          <input id="vault-file" type="file" x-ref="fileInput" @change="handleFilePick($event)" />
          <div class="toolbar-status" x-text="statusMessage"></div>
        </div>

        <dialog
          class="password-dialog"
          x-ref="passwordDialog"
          @cancel.prevent="cancelPasswordPrompt()"
          @close="pendingPassword = ''"
        >
          <form class="dialog-card" method="dialog" @submit.prevent="submitPasswordPrompt()">
            <h2 class="dialog-title">Unlock Revelation File</h2>
            <p class="dialog-copy">
              Enter the password for <strong x-text="passwordDialogFileName || fileName"></strong>.
            </p>
            <div class="dialog-field">
              <label for="dialog-password">Password</label>
              <input
                id="dialog-password"
                x-ref="passwordInput"
                type="password"
                x-model="pendingPassword"
                placeholder="Vault password"
                :disabled="isBusy"
              />
            </div>
            <div class="dialog-actions">
              <button type="button" class="button" @click="cancelPasswordPrompt()" :disabled="isBusy">
                Cancel
              </button>
              <button type="submit" class="button" :disabled="isBusy">
                Load
              </button>
            </div>
          </form>
        </dialog>

        <div class="layout">
          <aside class="sidebar">
            <div class="tree">
              <template x-for="node in tree" :key="node.id">
                <div>
                  <button
                    type="button"
                    class="tree-row"
                    :class="{ active: selectedId === node.id }"
                    :style="`padding-left: ${node.depth * 18 + 10}px`"
                    @click="selectNode(node)"
                  >
                    <span class="caret" @click.stop="toggleNode(node)">
                      <template x-if="node.children?.length">
                        <span x-text="expanded[node.id] ? '▾' : '▸'"></span>
                      </template>
                    </span>
                    <span class="tree-icon" x-text="iconForNode(node)"></span>
                    <span class="tree-label" x-text="node.label"></span>
                  </button>
                </div>
              </template>
            </div>
          </aside>

          <main class="content">
            <template x-if="selectedEntry">
              <div>
                <h1 class="detail-title" x-text="selectedEntry.title"></h1>
                <div class="detail-grid">
                  <template x-if="selectedEntry.description">
                    <div class="detail-row">
                      <div class="detail-label">Description:</div>
                      <div class="detail-value" x-text="selectedEntry.description"></div>
                    </div>
                  </template>

                  <template x-if="selectedEntry.url">
                    <div class="detail-row">
                      <div class="detail-label">URL:</div>
                      <div class="detail-value">
                        <a :href="selectedEntry.url" target="_blank" rel="noreferrer" x-text="selectedEntry.url"></a>
                      </div>
                    </div>
                  </template>

                  <template x-if="selectedEntry.username">
                    <div class="detail-row">
                      <div class="detail-label">Username:</div>
                      <div class="detail-value" x-text="selectedEntry.username"></div>
                    </div>
                  </template>

                  <template x-if="selectedEntry.password">
                    <div class="detail-row">
                      <div class="detail-label">Password:</div>
                      <div class="detail-value">
                        <span x-text="isSecretVisible('password') ? selectedEntry.password : maskedPassword(selectedEntry.password)"></span>
                        <span class="actions">
                          <button type="button" class="button" @click="toggleSecret('password')" x-text="isSecretVisible('password') ? 'Hide' : 'Show'"></button>
                          <button type="button" class="button" @click="copySecret('password', 'Password')">Copy</button>
                        </span>
                      </div>
                    </div>
                  </template>

                  <template x-if="selectedEntry.cardType">
                    <div class="detail-row">
                      <div class="detail-label">Card Type:</div>
                      <div class="detail-value" x-text="selectedEntry.cardType"></div>
                    </div>
                  </template>

                  <template x-if="selectedEntry.cardNumber">
                    <div class="detail-row">
                      <div class="detail-label">Card Number:</div>
                      <div class="detail-value" x-text="selectedEntry.cardNumber"></div>
                    </div>
                  </template>

                  <template x-if="selectedEntry.expiryDate">
                    <div class="detail-row">
                      <div class="detail-label">Expiry Date:</div>
                      <div class="detail-value" x-text="selectedEntry.expiryDate"></div>
                    </div>
                  </template>

                  <template x-if="selectedEntry.ccv">
                    <div class="detail-row">
                      <div class="detail-label">CCV:</div>
                      <div class="detail-value">
                        <span x-text="isSecretVisible('ccv') ? selectedEntry.ccv : maskedPassword(selectedEntry.ccv)"></span>
                        <span class="actions">
                          <button type="button" class="button" @click="toggleSecret('ccv')" x-text="isSecretVisible('ccv') ? 'Hide' : 'Show'"></button>
                          <button type="button" class="button" @click="copySecret('ccv', 'CCV')">Copy</button>
                        </span>
                      </div>
                    </div>
                  </template>

                  <template x-if="selectedEntry.pin">
                    <div class="detail-row">
                      <div class="detail-label">PIN:</div>
                      <div class="detail-value">
                        <span x-text="isSecretVisible('pin') ? selectedEntry.pin : maskedPassword(selectedEntry.pin)"></span>
                        <span class="actions">
                          <button type="button" class="button" @click="toggleSecret('pin')" x-text="isSecretVisible('pin') ? 'Hide' : 'Show'"></button>
                          <button type="button" class="button" @click="copySecret('pin', 'PIN')">Copy</button>
                        </span>
                      </div>
                    </div>
                  </template>

                  <template x-if="selectedEntry.location">
                    <div class="detail-row">
                      <div class="detail-label">Location:</div>
                      <div class="detail-value" x-text="selectedEntry.location"></div>
                    </div>
                  </template>

                  <template x-if="selectedEntry.code">
                    <div class="detail-row">
                      <div class="detail-label">Code:</div>
                      <div class="detail-value">
                        <span x-text="isSecretVisible('code') ? selectedEntry.code : maskedPassword(selectedEntry.code)"></span>
                        <span class="actions">
                          <button type="button" class="button" @click="toggleSecret('code')" x-text="isSecretVisible('code') ? 'Hide' : 'Show'"></button>
                          <button type="button" class="button" @click="copySecret('code', 'Code')">Copy</button>
                        </span>
                      </div>
                    </div>
                  </template>

                  <template x-if="selectedEntry.notes">
                    <div class="detail-row">
                      <div class="detail-label">Notes:</div>
                      <div class="detail-value">
                        <p class="notes" x-text="selectedEntry.notes"></p>
                      </div>
                    </div>
                  </template>
                </div>
              </div>
            </template>

            <template x-if="!selectedEntry">
              <p class="empty-state">Select an entry from the tree to view its details.</p>
            </template>
          </main>
        </div>
      </div>
    </div>
  </body>
</html>
